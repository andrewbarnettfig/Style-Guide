openapi: 3.1.0
info:
  title: Policy Transactions API - SetUp Systematic Withdrawal & SetUp Systematic RMD
  version: 1.0.0
  description:  |
    Single-file API spec for creating Systematic Withdrawal and Systematic RMD arrangements.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
    
paths:
  /v1/policies/{policyNumber}/withdrawals/systematic-withdrawals:
    post:
      operationId: createSystematicWithdrawalArrangement
      description: Create a new Systematic Withdrawal arrangement.
      tags:
        - Systematic Program Setup
      parameters:
        - $ref: '#/components/parameters/policyNumber'
        - $ref: '#/components/parameters/correlationId'
        - $ref: '#/components/parameters/associatedFirmId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitSystematicWithdrawalRequest'
            examples:
              Create_SWP_Amount_Example:
                summary: Systematic Withdrawal with amountType AMOUNT
                value:
                  effectiveDate: '2025-01-15'
                  actionIndicator: 'N'
                  nsccParticipantId: 'NSCC001'
                  externalArrangementId: 'EXT-ARR-7890'
                  cusip: '027ABCD12'
                  allocationOption: 'PRORATA'
                  systematicProgram:
                    paymentForm: 'ACH'
                    arrangementType: 'WITHDRAWAL'
                    amountType: 'AMOUNT'
                    netGrossIndicator: 'N'
                    requestedAmount: 300.00
                    frequency: 'MONTHLY'
                    startDate: '2025-02-01'
                    endDate: '2025-12-31'
                    previousTransactionDate: '2025-01-15'
                    nextTransactionDate: '2025-02-01'
                    payee:
                      - taxId: '123456789'
                        firstName: 'Alex'
                        middleName: 'M'
                        lastName: 'Smith'
                        type: individual
                        bank:
                          bankId: 'Bank_1'
                          nameOnAccount: 'Alex Smith'
                          accountStatus: 'ACTIVEBANKACCOUNT'
                          accountType: 'CHECKING'
                          accountNumber: '12345678'
                          routingNumber: '123456789'
                          branchName: 'Main Branch'
                        taxWithholdingInstructions:
                          - taxId: '123456789'
                            taxWithholdingType: 'FEDERAL'
                            taxRateToUse: 'USEVALUESENTERED'
                            filingStatus: 'SINGLE'
                            dollar: 20
                            exemptions: 0
                          - taxId: '123456789'
                            taxWithholdingType: 'STATE'
                            taxRateToUse: 'USEVALUESENTERED'
                            filingStatus: 'DEFAULT'
                            dollar: 10
                            exemptions: 0
                            taxJurisdiction: 'MA'
                    parties:
                      - taxId: '123456789'
                        firstName: 'Alex'
                        middleName: 'M'
                        lastName: 'Smith'
                        type: individual
                        relationships:
                          - owner
                        paymentForm: 'ACH'
                        allocationPercentage: 100
                        bank:
                          bankId: 'Bank_1'
                          nameOnAccount: 'Alex Smith'
                          accountStatus: 'ACTIVEBANKACCOUNT'
                          accountType: 'CHECKING'
                          accountNumber: '12345678'
                          routingNumber: '123456789'
                          branchName: 'Main Branch'
                        address:
                          addressId: '1'
                          addressType: 'RESIDENCE'
                          addressLine1: '100 Main St'
                          addressLine2: 'Downtown'
                          addressLine3: 'String'
                          addressLine4: 'String'
                          addressLine5: 'String'
                          city: 'Boston'
                          state: 'MA'
                          zipCode: '02110'
                          zipCodeExtension: '1234'
                          country: 'US'
                    producer:
                      producerNumber: 'PROD001'
                      npn: '1234567890'
                      crdNumber: '9876543210'
                    fundDistributions:
                      - fundId: 'FUND-ABC'
                        fundName: 'Growth Fund'
                        totalFundValue: null
                        requestedAmount: null
      responses:
        '201':
          description:  Created — request accepted for processing.
          headers:
            Location:
              description: >
               URL of the created arrangement resource.
               Format: /v1/policies/{policyNumber}/withdrawals/requests/{requestId}
              schema:
                type: string
                format: uri
            correlationId:
              $ref: '#/components/headers/correlationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WithdrawalRequestStatus'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '405': { $ref: '#/components/responses/MethodNotAllowedError' }
        '406': { $ref: '#/components/responses/NotAcceptableError' }
        '409': { $ref: '#/components/responses/ConflictError' }
        '413': { $ref: '#/components/responses/PayloadTooLargeError' }
        '415': { $ref: '#/components/responses/UnsupportedMediaTypeError' }
        '422': { $ref: '#/components/responses/UnprocessableEntityError' }
        '429': { $ref: '#/components/responses/TooManyRequestsError' }
        '500': { $ref: '#/components/responses/InternalServerError' }
        '502': { $ref: '#/components/responses/BadGatewayError' }
        '503': { $ref: '#/components/responses/ServiceUnavailableError' }
        '504': { $ref: '#/components/responses/GatewayTimeoutError' }

  /v1/policies/{policyNumber}/withdrawals/systematic-rmds:
    post:
      operationId: createSystematicRmdArrangement
      description: Create a new Systematic Required Minimum Distribution (RMD) arrangement.
      tags:
        - Systematic Program Setup
      parameters:
        - $ref: '#/components/parameters/policyNumber'
        - $ref: '#/components/parameters/correlationId'
        - $ref: '#/components/parameters/associatedFirmId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitSystematicRMDRequest'
            examples:
              Create_RMD_Percentage_Example:
                summary: RMD with amountType PERCENTAGE
                value:
                  effectiveDate: '2025-01-15'
                  actionIndicator: 'N'
                  nsccParticipantId: 'NSCC001'
                  externalArrangementId: 'EXT-ARR-7890'
                  cusip: '027ABCD12'
                  allocationOption: 'PRORATA'
                  systematicProgram:
                    paymentForm: 'ACH'
                    arrangementType: 'REQUIREDMINIMUMDISTRIBUTION'
                    amountType: 'PERCENTAGE'
                    netGrossIndicator: 'G'
                    requestedPercentage: 5.00
                    frequency: 'QUARTERLY'
                    startDate: '2025-02-01'
                    endDate: '2025-12-31'
                    previousTransactionDate: '2025-01-15'
                    nextTransactionDate: '2025-02-01'
                    payee:
                      - taxId: '123456789'
                        firstName: 'Alex'
                        middleName: 'M'
                        lastName: 'Smith'
                        type: individual
                        bank:
                          bankId: 'Bank_1'
                          nameOnAccount: 'Alex Smith'
                          accountStatus: 'ACTIVEBANKACCOUNT'
                          accountType: 'CHECKING'
                          accountNumber: '12345678'
                          routingNumber: '123456789'
                          branchName: 'Main Branch'
                        taxWithholdingInstructions:
                          - taxId: '123456789'
                            taxWithholdingType: 'FEDERAL'
                            taxRateToUse: 'USEVALUESENTERED'
                            filingStatus: 'SINGLE'
                            dollar: 10
                            exemptions: 0
                    parties:
                      - taxId: '123456789'
                        firstName: 'Alex'
                        middleName: 'M'
                        lastName: 'Smith'
                        type: individual
                        relationships:
                          - owner
                        paymentForm: 'ACH'
                        allocationPercentage: 100
                        bank:
                          bankId: 'Bank_1'
                          nameOnAccount: 'Alex Smith'
                          accountStatus: 'ACTIVEBANKACCOUNT'
                          accountType: 'CHECKING'
                          accountNumber: '12345678'
                          routingNumber: '123456789'
                          branchName: 'Main Branch'
                        address:
                          addressId: '1'
                          addressType: 'RESIDENCE'
                          addressLine1: '100 Main St'
                          addressLine2: 'Downtown'
                          addressLine3: 'String'
                          addressLine4: 'String'
                          addressLine5: 'String'
                          city: 'Boston'
                          state: 'MA'
                          zipCode: '02110'
                          zipCodeExtension: '1234'
                          country: 'US'
                    producer:
                      producerNumber: 'PROD001'
                      npn: '1234567890'
                      crdNumber: '9876543210'
                    fundDistributions:
                      - fundId: 'FUND-ABC'
                        fundName: 'Growth Fund'
                        totalFundValue: null
                        requestedAmount: null
                    rmdInfo:
                      rmdTaxYear: 2025
                      rmdAgeAtDistribution: 73
                      rmdSpouseDoB: '1958-04-01'
                      rmdRequestedAmount: 1200.00
                      rmdCalculationMethod: 'UNIFORM_LIFETIME_TABLE'
                      rmdPriorYearEndValue: 118560.00
      responses:
        '201':
          description: Created — request accepted for processing.
          headers:
            Location:
              description: >
               URL of the created arrangement resource.
               Format: /v1/policies/{policyNumber}/withdrawals/requests/{requestId}
              schema:
                type: string
                format: uri
            correlationId:
              $ref: '#/components/headers/correlationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WithdrawalRequestStatus'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '405': { $ref: '#/components/responses/MethodNotAllowedError' }
        '406': { $ref: '#/components/responses/NotAcceptableError' }
        '409': { $ref: '#/components/responses/ConflictError' }
        '413': { $ref: '#/components/responses/PayloadTooLargeError' }
        '415': { $ref: '#/components/responses/UnsupportedMediaTypeError' }
        '422': { $ref: '#/components/responses/UnprocessableEntityError' }
        '429': { $ref: '#/components/responses/TooManyRequestsError' }
        '500': { $ref: '#/components/responses/InternalServerError' }
        '502': { $ref: '#/components/responses/BadGatewayError' }
        '503': { $ref: '#/components/responses/ServiceUnavailableError' }
        '504': { $ref: '#/components/responses/GatewayTimeoutError' }

  /v1/policies/{policyNumber}/withdrawals/requests/{requestId}:
    get:
      operationId: getWithdrawalRequest
      tags:
        - Withdrawal Request Lifecycle
      description: Retrieve the withdrawal request resource created by POST.
      parameters:
        - $ref: '#/components/parameters/policyNumber'
        - name: requestId
          in: path
          required: true
          description: Identifier returned in the Location header from the POST.
          schema:
            type: string
      responses:
        '200':
          description: Withdrawal request resource.
          headers:
            correlationId:
              $ref: '#/components/headers/correlationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetWithdrawalRequestStatus'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '429': { $ref: '#/components/responses/TooManyRequestsError' }
        '500': { $ref: '#/components/responses/InternalServerError' }

components:
  parameters:
    policyNumber:
      name: policyNumber
      in: path
      required: true
      description: Unique policy number (1–30 characters).
      schema:
        type: string
        minLength: 1
        maxLength: 30
    correlationId:
      name: correlationId
      in: header
      required: false
      description: Optional client-supplied identifier to trace the request.
      schema:
        type: string
        maxLength: 100
    associatedFirmId:
      name: associatedFirmId
      in: query
      required: false
      description: Firm/linkage identifier.
      schema:
        type: string
        minLength: 1
        maxLength: 65

  headers:
    correlationId:
      description: Correlates this response to requests and downstream logs.
      schema:
        type: string
        maxLength: 100

  responses:
    BadRequestError:
      description: Bad Request
      headers:
        correlationId:
          $ref: '#/components/headers/correlationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnauthorizedError:
      description: Unauthorized
      headers:
        correlationId:
          $ref: '#/components/headers/correlationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ForbiddenError:
      description: Forbidden
      headers:
        correlationId:
          $ref: '#/components/headers/correlationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFoundError:
      description: Not Found
      headers:
        correlationId:
          $ref: '#/components/headers/correlationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    MethodNotAllowedError:
      description: Method Not Allowed
      headers:
        correlationId:
          $ref: '#/components/headers/correlationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotAcceptableError:
      description: Not Acceptable
      headers:
        correlationId:
          $ref: '#/components/headers/correlationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ConflictError:
      description: |
        A transaction for this policy is already in progress or an equivalent request has already been accepted.
        Re-submitting the same transaction while it is in-flight will be rejected to prevent duplicate processing.
      headers:
        correlationId:
          $ref: '#/components/headers/correlationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    PayloadTooLargeError:
      description: Payload Too Large
      headers:
        correlationId:
          $ref: '#/components/headers/correlationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnsupportedMediaTypeError:
      description: Unsupported Media Type
      headers:
        correlationId:
          $ref: '#/components/headers/correlationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnprocessableEntityError:
      description: Unprocessable Entity
      headers:
        correlationId:
          $ref: '#/components/headers/correlationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    TooManyRequestsError:
      description: Too Many Requests
      headers:
        correlationId:
          $ref: '#/components/headers/correlationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalServerError:
      description: Internal Server Error
      headers:
        correlationId:
          $ref: '#/components/headers/correlationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadGatewayError:
      description: Bad Gateway
      headers:
        correlationId:
          $ref: '#/components/headers/correlationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ServiceUnavailableError:
      description: Service Unavailable
      headers:
        correlationId:
          $ref: '#/components/headers/correlationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    GatewayTimeoutError:
      description: Gateway Timeout
      headers:
        correlationId:
          $ref: '#/components/headers/correlationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Producer:
      type: object
      description: Information about the producer submitting the request
      properties:
        producerNumber:
          type: string
          maxLength: 100
        npn:
          type: string
          maxLength: 100
        crdNumber:
          type: string
          maxLength: 100

    IndividualParty:
      description: Schema for individual party data
      type: object
      allOf:
        - $ref: '#/components/schemas/IndividualIdentity'
        - $ref: '#/components/schemas/PartyRelationship'

    EntityParty:
      description: Schema for entity party data
      type: object
      allOf:
        - $ref: '#/components/schemas/EntityIdentity'
        - $ref: '#/components/schemas/PartyRelationship'

    IndividualIdentity:
      description: Schema for individual identity data
      required:
        - firstName
        - lastName
        - taxId
      type: object
      properties:
        type:
          type: string
          const: individual
        firstName:
          type: string
          minLength: 1
          maxLength: 105
        middleName:
          type: string
          minLength: 1
          maxLength: 105
        lastName:
          type: string
          minLength: 1
          maxLength: 105
        taxId:
          type: string
          maxLength: 9

    PartyRelationship:
      description: Schema for party relationship data
      type: object
      required:
        - relationships
      properties:
        relationships:
          type: array
          minItems: 1
          maxItems: 2
          items:
            type: string
            enum:
              - owner
              - jointOwner
              - annuitant
              - jointAnnuitant
              - primaryBeneficiary
              - contingentBeneficiary

    EntityIdentity:
      description: Schema for entity identity data
      type: object
      required:
        - type
        - name
        - taxId
      properties:
        type:
          type: string
          const: entity
        name:
          type: string
          minLength: 1
          maxLength: 180
          pattern: '^[a-zA-Z0-9=()*@#\s.,''_/~%$!();:&"®`\\?\-]{1,180}$'
        taxId:
          type: string
          maxLength: 9

    SubmitSystematicWithdrawalRequest:
      type: object
      description: Request - SubmitSystematicWithdrawalRequest
      properties:
        effectiveDate:
          type: string
          format: date
        nsccParticipantId:
          type: string
          maxLength: 100
        externalArrangementId:
          type: string
          description: Arrangement ID from external system
          maxLength: 100
        actionIndicator:
          type: string
          enum: [N, O, C]
        cusip:
          type: string
          minLength: 9
          maxLength: 9
          pattern: '^[0-9]{3}[A-Z0-9]{5}[0-9]$'
          description: unique identification code. Optional; REQUIRED only when policyNumber is not globally unique.
        allocationOption:
          type: string
          enum: [PRORATA, DOLLAR, SPECIFYPERCENTAGE, SPECIFIEDFUNDS, SPECIFIEDSEGMENTS, DEFAULT, PECKINGORDER, EARNINGSONLY]
          description: Defines the format of how the funds are removed
        systematicProgram:
          allOf:
            - $ref: '#/components/schemas/SystematicProgram'
            - type: object
              properties:
                arrangementType:
                  type: string
                  enum: [PAYMENT, WITHDRAWAL, LOANREPAYMENT, PAYOUT]
      required:
        - effectiveDate
        - actionIndicator
        - externalArrangementId
        - allocationOption
      allOf:
        - if:
            properties:
              allocationOption:
                    const: SPECIFIEDFUNDS
              systematicProgram:
                type: object
                properties:
                  amountType:
                    const: AMOUNT
            required:
              - systematicProgram
              - allocationOption
          then:
            properties:
              systematicProgram:
                type: object
                properties:
                  fundDistributions:
                    type: array
                    items:
                      allOf:
                        - $ref: '#/components/schemas/FundDistribution'
                        - required: [requestedAmount]
            not:
              properties:
                systematicProgram:
                  properties:
                    fundDistributions:
                      items:
                        required: [requestedPercentage]
        - if:
            properties:
              allocationOption:
                    const: SPECIFIEDFUNDS
              systematicProgram:
                type: object
                properties:
                  amountType:
                    const: PERCENTAGE
            required:
              - systematicProgram
              - allocationOption
          then:
            properties:
              systematicProgram:
                type: object
                properties:
                  fundDistributions:
                    type: array
                    items:
                      allOf:
                        - $ref: '#/components/schemas/FundDistribution'
                        - required: [requestedPercentage]
            not:
              properties:
                systematicProgram:
                  properties:
                    fundDistributions:
                      items:
                        required: [requestedAmount]

    SubmitSystematicRMDRequest:
      type: object
      description: Request - SubmitSystematicRMDRequest
      properties:
        effectiveDate:
          type: string
          format: date
        nsccParticipantId:
          type: string
          maxLength: 100
        externalArrangementId:
          type: string
        actionIndicator:
          type: string
          enum: [N, O, C]
        cusip:
          type: string
          minLength: 9
          maxLength: 9
          pattern: '^[0-9]{3}[A-Z0-9]{5}[0-9]$'
          description: unique identification code. Optional; REQUIRED only when policyNumber is not globally unique.
        allocationOption:
          type: string
          enum: [PRORATA, DOLLAR, SPECIFYPERCENTAGE, SPECIFIEDFUNDS, SPECIFIEDSEGMENTS, DEFAULT, PECKINGORDER, EARNINGSONLY]
          description: Defines the format of how the funds are removed
        systematicProgram:
          allOf:
            - $ref: '#/components/schemas/SystematicProgram'
            - type: object
              properties:
                arrangementType:
                  type: string
                  enum: [REQUIREDMINIMUMDISTRIBUTION]
                rmdInfo:
                  $ref: '#/components/schemas/rmdInfo'
      required:
        - effectiveDate
        - actionIndicator
        - externalArrangementId
        - allocationOption
      allOf:
        - if:
            properties:
              allocationOption:
                    const: SPECIFIEDFUNDS
              systematicProgram:
                type: object
                properties:
                  amountType:
                    const: AMOUNT
            required:
              - systematicProgram
              - allocationOption
          then:
            properties:
              systematicProgram:
                type: object
                properties:
                  fundDistributions:
                    type: array
                    items:
                      allOf:
                        - $ref: '#/components/schemas/FundDistribution'
                        - required: [requestedAmount]
            not:
              properties:
                systematicProgram:
                  properties:
                    fundDistributions:
                      items:
                        required: [requestedPercentage]
        - if:
            properties:
              allocationOption:
                    const: SPECIFIEDFUNDS
              systematicProgram:
                type: object
                properties:
                  amountType:
                    const: PERCENTAGE
            required:
              - systematicProgram
              - allocationOption
          then:
            properties:
              systematicProgram:
                type: object
                properties:
                  fundDistributions:
                    type: array
                    items:
                      allOf:
                        - $ref: '#/components/schemas/FundDistribution'
                        - required: [requestedPercentage]
            not:
              properties:
                systematicProgram:
                  properties:
                    fundDistributions:
                      items:
                        required: [requestedAmount]

    SystematicProgram:
      type: object
      description: |
        Systematic program details for withdrawal or RMD setup.
        The property `rmdInfo` is only relevant and required when `arrangementType` is `REQUIREDMINIMUMDISTRIBUTION`.
      properties:
        paymentForm:
          type: string
          description: Mode of payment
          enum: [DTCC, ACH, CHECK, WIRE, EXCHANGE]
        arrangementType:
          type: string
          description: |
            "Indicates the type of financial arrangement being set up or updated for the systematic program, such as a recurring payment, withdrawal, loan repayment, required minimum distribution, or payout.[ for RMD, it will always be REQUIREDMINIMUMDISTRIBUTION]"
          enum: [PAYMENT, WITHDRAWAL, LOANREPAYMENT, REQUIREDMINIMUMDISTRIBUTION, PAYOUT]
        amountType:
          type: string
          description: |
            Amount Type selected by user.
            1. Amount – enter Transaction Amount
            2. Percentage – enter Percentage for Transaction Amount
            3. Max – auto-calculated using Maximum Withdrawal Amount. If selected user should NOT be able to enter Amount.
            4. Free Withdrawal Amount – auto-calculated using Free Withdrawal Amount. If selected user should NOT be able to enter Amount
            5. Withdraw Until Basis – auto-calculated using Cost Basis. If selected user should NOT be able to enter Amount. 
          enum: [AMOUNT, PERCENTAGE, MAX, FREEWITHDRAWALAMOUNT, WITHDRAWALUNTILBASIS, EARNINGSONLY]
        netGrossIndicator:
          type: string
          description: To indicate if the transaction is N="Net" or G="Gross"
          enum: [N, G]
        requestedAmount:
          type:
            - number
            - "null"
          minimum: 0
          maximum: 9999999999.99
        requestedPercentage:
          type: number
          description: Requested Percentage value
          minimum: 0
          maximum: 100
        frequency:
          type: string
          description: Indicates how often the systematic program executes
          enum: [DAILY, EVERYTWOWEEKS, MONTHLY, SEMIANNUAL, QUARTERLY, ANNUAL]
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        previousTransactionDate:
          type: string
          format: date
        nextTransactionDate:
          type: string
          format: date
        payee:
          type: array
          items:
            $ref: '#/components/schemas/Payee'
        parties:
          type: array
          items:
            $ref: '#/components/schemas/SystematicParty'
        producer:
          $ref: '#/components/schemas/Producer'
        fundDistributions:
          type: array
          items:
            $ref: '#/components/schemas/FundDistribution'
      required:
        - paymentForm
        - arrangementType
        - netGrossIndicator
      allOf:
        - if:
            properties:
              amountType:
                const: AMOUNT
            required:
              - amountType
          then:
            required:
              - requestedAmount
            not:
              required:
                - requestedPercentage
        - if:
            properties:
              amountType:
                const: PERCENTAGE
            required:
              - amountType
          then:
            required:
              - requestedPercentage
            not:
              required:
                - requestedAmount
        - if:
          properties:
            amountType:
              enum: [MAX, FREEWITHDRAWALAMOUNT, WITHDRAWALUNTILBASIS, EARNINGSONLY]
          then:
            required: [amountType]
            not:
              anyOf:
                - required: [requestedAmount]
                - required: [requestedPercentage]
                
    Payee:
      type: object
      anyOf:
        - $ref: '#/components/schemas/IndividualIdentity'
        - $ref: '#/components/schemas/EntityIdentity'
      properties:
        bank:
          $ref: '#/components/schemas/Bank'
        taxWithholdingInstructions:
          type: array
          items:
            $ref: '#/components/schemas/TaxWithholdingInstruction'

    Bank:
      type: object
      properties:
        bankId:
          type: string
          description: Comes in Acord 103
          maxLength: 100
        nameOnAccount:
          type: string
          description: Name of the registered user
          maxLength: 100
        accountStatus:
          type: string
          enum: [ACTIVEBANKACCOUNT, TERMINATEDBANKACCOUNT]
        accountType:
          type: string
          enum: [CHECKING, SAVINGS, CREDITCARDACCOUNT, DEBITCARDACCOUNT, BROKERAGEACCOUNT, CERTIFICATEOFDEPOSITACCOUNT]
        accountNumber:
          type: string
          pattern: '^\d{4,17}$'
          maxLength: 17
        routingNumber:
          type: string
          pattern: '^\d{9}$'
        branchName:
          type: string
          description: branch name
          maxLength: 100
      required:
        - nameOnAccount
        - accountType
        - accountNumber
        - routingNumber

    TaxWithholdingInstruction:
      type: object
      description: List of tax withholding instruction entries
      properties:
        taxId:
          type: string
          description: Tax Identification Number
          maxLength: 9
        taxWithholdingType:
          type: string
          enum: [FEDERAL, STATE, NRA, BACKUP]
        taxRateToUse:
          type: string
          enum: [NOWITHHOLDINGELECTED, USEVALUESENTERED, NOWITHHOLDINGALLOWED, USEDEFAULTTABLE]
        filingStatus:
          type: string
          enum: [SINGLE, DOMESTICPARTNERSHIP, DEFAULT, MARRIED, HEADOFHOUSEHOLD, WIDOWED, DIVORCED]
        dollar:
          type: number
          minimum: 0
          maximum: 9999999999.99
        percentage:
          type: number
          minimum: 0
          maximum: 100
        exemptions:
          type: integer
          minimum: 0
          maximum: 99
        taxJurisdiction:
          type: string
          maxLength: 50
      required:
        - taxWithholdingType
        - taxRateToUse
        - taxId
      oneOf:
        - description: Use a fixed dollar amount for withholding.
          required: [dollar]
        - description: Use a percentage for withholding.
          required: [percentage]
      allOf:
        - if:
            properties:
              taxWithholdingType:
                const: STATE
          then:
            required:
              - taxJurisdiction

    SystematicParty:
      type: object
      anyOf:
        - $ref: '#/components/schemas/IndividualParty'
        - $ref: '#/components/schemas/EntityParty'
      properties:
        paymentForm:
          type: string
          enum: [DTCC, ACH, CHECK, WIRE, EXCHANGE]
        allocationPercentage:
          type: number
          description: At Policy Level for Each Applicable Fund
          minimum: 0
          maximum: 100
        bank:
          $ref: '#/components/schemas/Bank'
        address:
          $ref: '#/components/schemas/Address'
      required:
        - paymentForm
        - allocationPercentage

    Address:
      type: object
      properties:
        addressId:
          type: string
          description: Address ID
          maxLength: 100
        addressType:
          type: string
          enum: [RESIDENCE, BUSINESS, POBOXSEASONAL, APO, DPO, FPO]
        addressLine1:
          type: string
          maxLength: 100
        addressLine2:
          type: string
          maxLength: 100
        addressLine3:
          type: string
          maxLength: 100
        addressLine4:
          type: string
          maxLength: 100
        addressLine5:
          type: string
          maxLength: 100
        city:
          type: string
          maxLength: 100
        state:
          type: string
          pattern: '^[A-Z]{2}$'
        zipCode:
          type: string
          pattern: '^[0-9A-Za-z -]{3,10}$'
        zipCodeExtension:
          type: string
          pattern: '^[0-9A-Za-z]{1,4}$'
        country:
          type: string
          pattern: '^[A-Z]{2}$'
      required:
        - addressType
        - addressLine1
        - city
        - state
        - zipCode

    FundDistribution:
      type: object
      description: Detailed allocation of funds
      properties:
        fundId:
          type: string
          maxLength: 100
          description: Fund identifier
        fundName:
          type: string
          maxLength: 100
          description: Name of the fund
        totalFundValue:
          type: [number, "null"]
          description: Total value of the fund
          minimum: 0
          maximum: 9999999999.99
        requestedAmount:
          type: [number, "null"]
          description: Requested amount from the fund
          minimum: 0
          maximum: 9999999999.99
        requestedPercentage:
          type: number
          description: Requested percentage from the fund
          minimum: 0
          maximum: 100
      oneOf:
        - required: [requestedAmount]
          not:
            required: [requestedPercentage]
        - required: [requestedPercentage]
          not:
            required: [requestedAmount]

    rmdInfo:
      type: object
      description: required minimum distribution (rmd) details for the systematic program
      properties:
        rmdTaxYear:
          type: integer
          description: The tax year this rmd withdrawal is for (e.g., 2025).
          minimum: 1900
          maximum: 2100
        rmdAgeAtDistribution:
          type: integer
          description: The age of the rmd owner on the distribution date, in whole years.
          minimum: 0
          maximum: 150
        rmdSpouseDoB:
          type: string
          format: date
          description: Date of birth of the spouse used for rmd calculations, if applicable.
        rmdRequestedAmount:
          type: number
          description: Portion of this withdrawal that should count toward rmd for rmdTaxYear.
          minimum: 0
          maximum: 9999999999.99
        rmdCalculationMethod:
          type: string
          description: The method or IRS table used to calculate the rmd.
          enum: [UNIFORM_LIFETIME_TABLE, JOINT_LIFE, SINGLE_LIFE, OTHER]
        rmdPriorYearEndValue:
          type: number
          description: Contract value as of 12/31 of the prior year used as the base for rmd calculation.
          minimum: 0
          maximum: 9999999999.99
      required:
        - rmdTaxYear
        - rmdRequestedAmount
        - rmdCalculationMethod
        - rmdAgeAtDistribution

    WithdrawalRequestStatus:
      type: object
      description: Withdrawal request status resource created by the POST.
      properties:
        requestId:
          type: string
          description: Server-assigned identifier for the withdrawal request.
        status:
          type: string
          description: Current status of the withdrawal request.
          enum: [CREATED, REJECTED]
        effectiveDate:
          type: string
          format: date
      required: [requestId, status]

    GetWithdrawalRequestStatus:
      type: object
      description: Withdrawal request status resource created by the GET request.
      properties:
        requestId:
          type: string
          description: Server-assigned identifier for the withdrawal request.
        status:
          type: string
          description: Current status of the withdrawal request.
          enum: [IN_PROGRESS, SUCCESS, REJECTED]
        effectiveDate:
          type: string
          format: date
        message:
          type: string
          description: Technical message with specific error details for developers identify the type of error quickly.
      required: [requestId, status]

    Error:
      type: object
      properties:
        httpStatus:
          type: integer
          description: HTTP status code associated with this error
          minimum: 400
          maximum: 599
        code:
          type: string
          description: |
            A structured error code that uniquely identifies the type of error. This can follow a hierarchical format:
            - <domain>: The logical domain (e.g., "gateway")
            - <category>: The error category (e.g., "client" or "server")
            - <subcategory>: A specific error identifier (e.g., "badrequest", "timeout")
        timestamp:
          type: string
          format: date-time
          description: Time when the error occurred
        message:
          type: string
          description: Technical message with specific error details for developers identify the type of error quickly.
        userMessage:
          type: string
          description: End-user readable message to describe the error in simple terms.
        validationErrors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                description: Name of the field on which error has occurred
              location:
                type: string
                description: The specific location where the error occured.
              reason:
                type: string
                description: Details about why the error occurred
        businessErrors:
          type: array
          description: Logical business rule violations or decision failures related to business logic or rules
          items:
            type: object
            properties:
              code:
                type: string
                description: Code to classify the business error & Identifies the type of business rule or decision failure.
              message:
                type: string
                description: Why the business error occurred / Specific business rule violation
      required: [code, message]