                    taxWithheldAmounts:
                    - taxId: '123456789'
                      taxWithholdingType: 'FEDERAL'
                      withholdAmount: 100.00
                      withheldTaxableAmount: 1200.00
                    payeeOrBeneficiary:
                    - taxId: '123456789'
                      paymentForm: 'DTCC'
                      allocationPercentage: 100
                      disbursementAmount: 4850.00
                    taxQualification:
                      isTefraApplicable: true
                      isTemraApplicable: true
                      tefraValue: 100.00
                      temraValue: 100.00
                      isirc72qPenaltyApplied: false
                      taxablePortionRule: 'LIFO'
                    parties:
                    - taxId: '123456789'
                      firstName: 'Taylor'
                      middleName: 'A'
                      lastName: 'Johnson'
                      type: individual
                      relationships:
                         - owner
                      paymentForm: 'DTCC'
                      allocationPercentage: 100
                    rmdInfo:
                      rmdTaxYear: 2026
                      rmdAgeAtDistribution: 72
