                partialSpecifiedWithdrawalResponse:
                  summary: Partial One-Time Withdrawal - Specified Withdrawal (Loan Deduction in Charges)
                  value:
                    status: 'SUCCESS'
                    policyNumber: 'POL123456789'
                    effectiveDate: '2026-01-16'
