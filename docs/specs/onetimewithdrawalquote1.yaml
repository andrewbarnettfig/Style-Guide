openapi: 3.1.0
info:
  title: Withdrawal Quote API
  version: 1.0.0
  description: >
    A single, standardized **POST** quote endpoint for withdrawal transactions.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
paths:
  /v1/policies/{policyNumber}/withdrawals/full-surrenders/quote:
    post:
      operationId: calculateFullSurrenderQuote
      tags:
        - Withdrawal Quote
      description: >
        Calculate a withdrawal quote for a **full surrender** transaction. This is a synchronous compute action
      parameters:
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - $ref: '#/components/parameters/PolicyNumber'
        - $ref: '#/components/parameters/AssociatedFirmId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FullSurrenderQuoteRequest'
            examples:
              FullSurrenderQuoteRequest_Example:
                summary: Full Surrender Quote compute request
                value:
                  effectiveDate: '2026-01-16'
                  nsccParticipantId: 'NSCC999'
                  cusip: '0275IFOW4'
                  producer:
                    producerNumber: 'PROD999'
                    npn: '9876543210'
                    crdNumber: '1234567890'
                  transactionAmounts:
                    disbursementType: 'NET'
                    disbursementPaymentForm: 'EFT'
                  payeeOrBeneficiary:
                    - paymentForm: 'EFT'
                      allocationPercentage: 100
                      party:
                        firstName: 'Taylor'
                        middleName: 'A'
                        lastName: 'Johnson'
                        type: 'individual'
                        taxId: '123456789'
                      bank:
                        bankId: 'Bank_FS'
                        nameOnAccount: 'Taylor Johnson'
                        accountStatus: 'ACTIVEBANKACCOUNT'
                        accountType: 'CHECKING'
                        accountNumber: '9876543210'
                        routingNumber: '987654321'
                        branchName: 'Central Branch'
                  parties:
                    - paymentForm: 'EFT'
                      allocationPercentage: 100
                      bank:
                        bankId: 'Bank_FS'
                        nameOnAccount: 'Taylor Johnson'
                        accountStatus: 'ACTIVEBANKACCOUNT'
                        accountType: 'CHECKING'
                        accountNumber: '9876543210'
                        routingNumber: '987654321'
                        branchName: 'Central Branch'
                      address:
                        addressId: 'Addr_FS'
                        addressType: 'RESIDENCE'
                        addressLine1: '200 Main St'
                        city: 'New York'
                        state: 'NY'
                        zipCode: '10001'
                        country: 'US'
      responses:
        '200':
          description: Withdrawal quote calculated successfully.
          headers:
            correlationId:
              $ref: '#/components/headers/correlationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FullSurrenderQuoteResponse'
              examples:
                FullSurrenderResponse:
                  summary: Full Surrender Quote Response
                  value:
                    status: 'SUCCESS'
                    policyNumber: 'POL123456789'
                    effectiveDate: '2026-01-16'
                    cusip: '0275IFOW4'
                    freeWithdrawalAmount: 1000.00
                    remainingFreeWithdrawalAmount: 500.00
                    tenPercentOfPurchasePayments: 10000.00
                    freeAmountGain: 120.00
                    freeAmountPremium: 300.00
                    transactionAmounts:
                      appliedAmount: 5000.00
                      taxableAmount: 1200.00
                      totalChargeAmount: 50.00
                      totalTaxWithheldAmount: 100.00
                      netPaymentAmount: 4850.00
                      disbursementType: 'GROSS'
                      disbursementPaymentForm: 'DTCC'
                      grossPaymentAmount: 5000.00
                      cashSurrenderValue: 25000.00
                      accumulatedCashValue: 18000.00
                      grossCashValueAmount: 25000.00
                    charges:
                      - chargeType: 'SURRENDERCHARGE'
                        chargeAmount: 50.00
                        chargeCategory: 'FEE'
                        isChargeWaived: false
                        chargeWaiverReason: 'NONE'
                        isMvaApplied: false
                    taxWithheldAmounts:
                      - taxId: '123456789'
                        taxWithholdingType: 'FEDERAL'
                        withholdAmount: 100.00
                        withheldTaxableAmount: 1200.00
                    payeeOrBeneficiary:
                      - taxId: '123456789'
                        paymentForm: 'DTCC'
                        allocationPercentage: 100
                        disbursementAmount: 4850.00
                    taxQualification:
                      isTefraApplicable: true
                      isTemraApplicable: true
                      tefraValue: 100.00
                      temraValue: 100.00
                      isirc72qPenaltyApplied: false
                      taxablePortionRule: 'LIFO'
                    parties:
                      - taxId: '123456789'
                        firstName: 'Taylor'
                        middleName: 'A'
                        lastName: 'Johnson'
                        type: individual
                        relationships:
                          - owner
                        paymentForm: 'DTCC'
                        allocationPercentage: 100
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '405': { $ref: '#/components/responses/MethodNotAllowedError' }
        '406': { $ref: '#/components/responses/NotAcceptableError' }
        '409': { $ref: '#/components/responses/ConflictError' }
        '413': { $ref: '#/components/responses/PayloadTooLargeError' }
        '415': { $ref: '#/components/responses/UnsupportedMediaTypeError' }
        '422': { $ref: '#/components/responses/UnprocessableEntityError' }
        '429': { $ref: '#/components/responses/TooManyRequestsError' }
        '500': { $ref: '#/components/responses/InternalServerError' }
        '502': { $ref: '#/components/responses/BadGatewayError' }
        '503': { $ref: '#/components/responses/ServiceUnavailableError' }
        '504': { $ref: '#/components/responses/GatewayTimeoutError' }

  /v1/policies/{policyNumber}/withdrawals/one-time-partials/quote:
    post:
      operationId: calculateOneTimePartialWithdrawalQuote
      tags: [Withdrawal Quote]
      description: >
        Calculate a quote for a **one-time partial withdrawal** (including RMD when transactionSubType is `rmd`).
      parameters:
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - $ref: '#/components/parameters/PolicyNumber'
        - $ref: '#/components/parameters/TransactionSubType'
        - $ref: '#/components/parameters/AssociatedFirmId'
      x-business-rule:
        rmd:
          when:
            transactionSubType: rmd
          require:
            - $.rmdInfo
        nonRmd:
          when:
            transactionSubType:
              not:
                in: [rmd]
          constraints:
            - name: "forbid-rmdInfo-when-not-rmd"
              description: When transactionSubType is not RMD, rmdInfo must be omitted to avoid ambiguous payloads.
              assert: "$.rmdInfo == null"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OneTimePartialWithdrawalQuoteRequest'
            examples:
              PartialWithdrawalQuoteRequest_RMD:
                summary: Partial one-time withdrawal (RMD) quote compute request
                value:
                  effectiveDate: '2026-01-16'
                  nsccParticipantId: 'NSCC888'
                  cusip: '0275IFOW4'
                  producer:
                    producerNumber: 'PROD888'
                    npn: '1111111111'
                    crdNumber: '2222222222'
                  transactionAmounts:
                    requestedAmount: 750.00
                    amountType: 'AMOUNT'
                    disbursementType: 'NET'
                    disbursementPaymentForm: 'ACH'
                  allocationOption: 'PRORATA'
                  fundDistributions:
                    - fundId: 'FUND-RMD1'
                      fundName: 'Balanced Fund'
                      totalFundValue: null
                      requestedAmount: null
                    - fundId: 'FUND-RMD2'
                      fundName: 'Equity Fund'
                      totalFundValue: null
                      requestedAmount: null
                  rmdInfo:
                    rmdTaxYear: 2026
                    rmdAgeAtDistribution: 72
                    rmdSpouseDoB: '1955-01-01'
                    rmdRequestedAmount: 750.00
                    rmdCalculationMethod: 'UNIFORM_LIFETIME_TABLE'
                    rmdPriorYearEndValue: 80000.00
                  payeeOrBeneficiary:
                    - paymentForm: 'ACH'
                      allocationPercentage: 100.00
                      party:
                        taxId: '123456789'
                        firstName: 'Morgan'
                        middleName: 'B'
                        lastName: 'Lee'
                        type: individual
                      bank:
                        bankId: 'Bank_RMD'
                        nameOnAccount: 'Morgan Lee'
                        accountStatus: 'ACTIVEBANKACCOUNT'
                        accountType: 'CHECKING'
                        accountNumber: '123123123'
                        routingNumber: '321321321'
                        branchName: 'Downtown Branch'
                  parties:
                    - paymentForm: 'ACH'
                      allocationPercentage: 100
                      bank:
                        bankId: 'Bank_RMD'
                        nameOnAccount: 'Morgan Lee'
                        accountStatus: 'ACTIVEBANKACCOUNT'
                        accountType: 'CHECKING'
                        accountNumber: '123123123'
                        routingNumber: '321321321'
                        branchName: 'Downtown Branch'
                      address:
                        addressId: 'Addr_RMD'
                        addressType: 'RESIDENCE'
                        addressLine1: '300 Elm St'
                        city: 'Chicago'
                        state: 'IL'
                        zipCode: '60601'
                        country: 'US'
                  taxWithholdingInstructions:
                    - party:
                        taxId: '123456789'
                        firstName: 'Morgan'
                        middleName: 'B'
                        lastName: 'Lee'
                        type: individual
                      taxWithholdingType: 'FEDERAL'
                      taxRateToUse: 'USEVALUESENTERED'
                      filingStatus: 'SINGLE'
                      dollar: 15.00
                      exemptions: 0
                  charges:
                    - chargeType: 'WITHDRAWALCHARGE'
                      isChargeWaived: false

              OneTimePartialWithdrawalQuoteNonRMD_Example:
                  summary: Partial Withdrawal non-RMD subtype (specified-withdrawal)
                  value:
                    effectiveDate: '2025-04-01'
                    nsccParticipantId: 'NSCC777'
                    cusip: '0275IFOW4'
                    producer:
                      producerNumber: 'PROD777'
                      npn: '3333333333'
                      crdNumber: '4444444444'
                    transactionAmounts:
                      requestedAmount: 1000
                      amountType: 'AMOUNT'
                      disbursementType: 'GROSS'
                      disbursementPaymentForm: 'CHECK'
                    allocationOption: 'SPECIFIEDFUNDS'
                    fundDistributions:
                      - fundId: 'FUND-NRMD1'
                        fundName: 'Income Fund'
                        totalFundValue: 4000
                        requestedAmount: 1000
                    payeeOrBeneficiary:
                      - paymentForm: 'CHECK'
                        allocationPercentage: 100.00
                        party:
                          taxId: '123456789'
                          firstName: 'Jordan'
                          middleName: 'C'
                          lastName: 'Kim'
                          type: individual
                          address:
                            addressId: 'Addr_NRMD'
                            addressType: 'RESIDENCE'
                            addressLine1: '400 Oak St'
                            addressLine2: 'Apt 2'
                            addressLine3: 'Bldg B'
                            addressLine4: 'String'
                            addressLine5: 'String'
                            city: 'San Francisco'
                            state: 'CA'
                            zipCode: '94102'
                            zipCodeExtension: '5555'
                            country: 'US'
                    parties:
                      - taxId: '123456789'
                        firstName: 'Jordan'
                        middleName: 'C'
                        lastName: 'Kim'
                        type: individual
                        relationships:
                          - owner
                        paymentForm: 'CHECK'
                        allocationPercentage: 100
                        bank:
                          bankId: 'Bank_NRMD'
                          nameOnAccount: 'Jordan Kim'
                          accountStatus: 'ACTIVEBANKACCOUNT'
                          accountType: 'CHECKING'
                          accountNumber: '555666777'
                          routingNumber: '111222333'
                          branchName: 'Uptown Branch'
                        address:
                          addressId: 'Addr_NRMD'
                          addressType: 'RESIDENCE'
                          addressLine1: '400 Oak St'
                          addressLine2: 'Apt 2'
                          addressLine3: 'Bldg B'
                          addressLine4: 'String'
                          addressLine5: 'String'
                          city: 'San Francisco'
                          state: 'CA'
                          zipCode: '94102'
                          zipCodeExtension: '5555'
                          country: 'US'
                    taxWithholdingInstructions:
                      - party:
                          taxId: '123456789'
                          firstName: 'Jordan'
                          middleName: 'C'
                          lastName: 'Kim'
                          type: individual
                        taxWithholdingType: 'STATE'
                        taxRateToUse: 'USEDEFAULTTABLE'
                        filingStatus: 'DEFAULT'
                        dollar: 5
                        exemptions: 0
                        taxJurisdiction: 'USA'
                    charges:
                      - chargeType: 'WITHDRAWALCHARGE'
                        isChargeWaived: true
                        chargeWaiverReason: 'PROMO'
                    isOverride: true
      responses:
        '200':
          description: Withdrawal quote calculated successfully.
          headers:
            correlationId:
              $ref: '#/components/headers/correlationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartialsWithdrawalQuoteResponse'
              examples:
                partialRmdResponse:
                  summary: Partial One-Time Withdrawal - RMD Quote Response
                  value:
                    status: 'SUCCESS'
                    policyNumber: 'POL123456789'
                    effectiveDate: '2026-01-16'
                    cusip: '0275IFOW4'
                    freeWithdrawalAmount: 1000.00
                    remainingFreeWithdrawalAmount: 500.00
                    tenPercentOfPurchasePayments: 10000.00
                    freeAmountGain: 120.00
                    freeAmountPremium: 300.00
                    transactionAmounts:
                      amountType: 'AMOUNT'
                      requestedAmount: 5000.00
                      appliedAmount: 5000.00
                      taxableAmount: 1200.00
                      totalChargeAmount: 50.00
                      totalTaxWithheldAmount: 100.00
                      netPaymentAmount: 4850.00
                      disbursementType: 'GROSS'
                      disbursementPaymentForm: 'DTCC'
                      grossPaymentAmount: 5000.00
                      cashSurrenderValue: 25000.00
                      accumulatedCashValue: 18000.00
                      grossCashValueAmount: 25000.00
                    charges:
                    - chargeType: 'LOANPAYOFF'
